<section class="interest-section" [id]="sectionId">
  <div class="section-content">
    <div class="section-text">
      <span class="section-label">Área de interesse</span>

      <h2>{{ title }}</h2>

      <h3>{{ subtitle }}</h3>

      <p>{{ description }}</p>
    </div>

    <div class="topics-card">
      <h4>Principais pontos:</h4>

      <ul>
        @for (topic of topics; track topic) {
          <li>{{ topic }}</li>
        }
      </ul>
    </div>
  </div>
</section>
