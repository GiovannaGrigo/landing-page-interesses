<app-navbar></app-navbar>

<main>
  <section class="hero" id="inicio">
    <div class="hero-content">
      <span class="hero-tag">Desenvolvimento • Tecnologia • Chatbot IA</span>

      <h1>Áreas de interesse</h1>

      <p>
        Esta landing page apresenta as principais áreas que eu tenho interesse
        em estudar, desenvolver e evoluir dentro da programação.
      </p>

      <a href="#backend" class="hero-button">Conhecer áreas</a>
    </div>

    <div class="hero-cat">
      <img class="hero-cat-img" src="pink-cat-line.png" alt="Ilustração de gato em linha rosa" />
    </div>
  </section>

  <app-interest-section
    sectionId="backend"
    title="Backend"
    subtitle="Construindo a lógica por trás das aplicações"
    description="Tenho interesse em Backend por ser a área responsável por estruturar a lógica, as regras de negócio e a comunicação entre sistemas. É onde entram APIs, bancos de dados, integrações e toda a base que permite que uma aplicação funcione de forma segura, organizada e escalável."
    [topics]="backendTopics"
  ></app-interest-section>

  <app-interest-section
    sectionId="frontend"
    title="Frontend"
    subtitle="Transformando ideias em interfaces"
    description="Tenho interesse em Frontend por ser a área que transforma ideias e regras de negócio em interfaces visuais, interativas e intuitivas para o usuário. Gosto especialmente de trabalhar com Angular, criando telas organizadas, componentes reutilizáveis e experiências que tornam o uso da aplicação mais simples e agradável."
    [topics]="frontendTopics"
  ></app-interest-section>

  <app-interest-section
    sectionId="ia"
    title="Chatbots com IA"
    subtitle="Criando assistentes inteligentes para conversas"
    description="Tenho interesse em chatbots com IA por enxergar neles uma forma prática de automatizar atendimentos, responder dúvidas e facilitar a interação entre pessoas e sistemas. Gosto da ideia de criar assistentes capazes de entender perguntas, conduzir conversas e ajudar o usuário de forma simples, rápida e eficiente."
    [topics]="iaTopics"
  ></app-interest-section>
</main>

<footer class="footer">
  <p class="footer-text">Feito usando Angular, café e amor por gatos.</p>
</footer>
